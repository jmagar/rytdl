<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube search</title>
  <style>
    :root {
      --aurora-page-bg: #07131c;
      --aurora-panel-medium: #102532;
      --aurora-panel-strong: #132d3d;
      --aurora-control-surface: #0d202c;
      --aurora-border-default: #1d3d4e;
      --aurora-border-strong: #2a5870;
      --aurora-text-primary: #e6f4fb;
      --aurora-text-muted: #a7bcc9;
      --aurora-accent-primary: #29b6f6;
      --aurora-accent-pink: #f9a8c4;
      --aurora-active-glow: 0 0 0 1px color-mix(in srgb, var(--aurora-accent-primary) 78%, transparent), 0 0 26px color-mix(in srgb, var(--aurora-accent-primary) 22%, transparent);
      --aurora-radius-1: 8px;
      --aurora-radius-3: 8px;
      --aurora-shadow-strong: 0 24px 70px rgba(0, 0, 0, 0.38);
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--aurora-page-bg);
      color: var(--aurora-text-primary);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, sans-serif;
    }
    .shell { padding: 18px; }
    .panel {
      border: 1px solid var(--aurora-border-strong);
      border-radius: var(--aurora-radius-3);
      background: var(--aurora-panel-strong);
      box-shadow: var(--aurora-shadow-strong), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
    }
    .tabs, .toolbar, .utility { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--aurora-border-default); background: var(--aurora-control-surface); }
    .toolbar { display: grid; grid-template-columns: 1fr auto; gap: 10px; background: var(--aurora-panel-medium); }
    input {
      min-width: 0;
      height: 40px;
      border-radius: var(--aurora-radius-1);
      border: 1px solid var(--aurora-border-default);
      background: var(--aurora-control-surface);
      color: var(--aurora-text-primary);
      padding: 0 12px;
      font: 560 13px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      outline: none;
    }
    input:focus, button:focus-visible { border-color: var(--aurora-border-strong); box-shadow: var(--aurora-active-glow); }
    button {
      height: 40px;
      border-radius: var(--aurora-radius-1);
      border: 1px solid var(--aurora-border-strong);
      background: color-mix(in srgb, var(--aurora-accent-primary) 18%, var(--aurora-control-surface));
      color: var(--aurora-text-primary);
      font: 650 13px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      padding: 0 14px;
      cursor: pointer;
    }
    .tabs button[aria-selected="true"] { background: color-mix(in srgb, var(--aurora-accent-primary) 34%, var(--aurora-control-surface)); }
    .utility button { height: 30px; padding: 0 10px; font-size: 12px; }
    .host-context { margin-left: auto; min-width: 0; color: var(--aurora-text-muted); font-size: 12px; overflow-wrap: anywhere; }
    .results, .stats-list { display: grid; gap: 1px; background: var(--aurora-border-default); }
    .result, .recent-item {
      display: grid;
      grid-template-columns: 112px 1fr auto;
      gap: 14px;
      padding: 12px;
      background: var(--aurora-panel-strong);
      border: 1px solid transparent;
    }
    .result[aria-selected="true"] { border-color: var(--aurora-border-strong); box-shadow: inset 3px 0 0 var(--aurora-accent-primary); }
    .thumb { width: 112px; aspect-ratio: 16 / 9; border-radius: 8px; object-fit: cover; background: var(--aurora-control-surface); }
    .title { margin: 0 0 5px; font: 760 14px/1.2 Manrope, Inter, sans-serif; }
    .copy { min-width: 0; }
    .title, .meta { overflow-wrap: anywhere; }
    .meta { color: var(--aurora-text-muted); font-size: 12px; }
    .actions { display: flex; align-items: center; gap: 8px; }
    .actions button { height: 32px; padding: 0 10px; }
    .actions .download { border-color: color-mix(in srgb, var(--aurora-accent-pink) 55%, var(--aurora-border-strong)); background: color-mix(in srgb, var(--aurora-accent-pink) 13%, var(--aurora-control-surface)); }
    .empty { padding: 30px; color: var(--aurora-text-muted); text-align: center; }
    .stats-summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1px; background: var(--aurora-border-default); }
    .stat-card { min-width: 0; padding: 14px; background: var(--aurora-panel-strong); }
    .stat-value { font: 780 24px/1 Manrope, Inter, sans-serif; }
    .stat-label { margin-top: 5px; color: var(--aurora-text-muted); font-size: 12px; }
    .stats-toolbar { display: flex; align-items: center; gap: 8px; padding: 12px 14px; background: var(--aurora-panel-medium); border-bottom: 1px solid var(--aurora-border-default); }
    @media (max-width: 640px) {
      .toolbar { grid-template-columns: 1fr; }
      .result, .recent-item { grid-template-columns: 88px 1fr; }
      .thumb { width: 88px; }
      .actions { grid-column: 1 / -1; }
      .utility, .tabs, .stats-toolbar { flex-wrap: wrap; }
      .host-context { flex-basis: 100%; margin-left: 0; }
      .stats-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <nav class="tabs" aria-label="YouTube app views">
        <button type="button" data-view="search" aria-selected="true">Search</button>
        <button type="button" data-view="stats" aria-selected="false">Stats</button>
      </nav>
      <section id="search-view">
        <form class="toolbar" id="search-form">
          <input id="query" name="query" autocomplete="off" placeholder="Search YouTube" />
          <button type="submit">Search</button>
        </form>
        <div class="utility" id="utility" hidden>
          <button type="button" id="ask-button">Ask</button>
          <button type="button" id="fullscreen-button">Fullscreen</button>
          <button type="button" id="download-json-button">JSON</button>
          <span class="host-context" id="host-context"></span>
        </div>
        <div class="results" id="results">
          <div class="empty">Enter a query to search YouTube.</div>
        </div>
      </section>
      <section id="stats-view" hidden>
        <div class="stats-toolbar">
          <button type="button" id="refresh-stats-button">Refresh</button>
          <span class="meta">Download history and recent activity</span>
        </div>
        <div id="stats"></div>
      </section>
    </section>
  </main>
  <script>
    
window.McpExtApps = {
  App: class {
    constructor() {}
    getHostContext() { return { theme: 'dark', displayMode: 'inline', locale: 'en-US', availableDisplayModes: ['inline', 'fullscreen'] }; }
    connect() { return Promise.resolve({}); }
    sendLog() {}
    updateModelContext() { return Promise.resolve({}); }
    sendMessage() { return Promise.resolve({}); }
    openLink() { return Promise.resolve({}); }
    requestDisplayMode() { return Promise.resolve({}); }
    downloadFile() { return Promise.resolve({}); }
    callServerTool({ name }) {
      if (name === 'youtube_stats') return Promise.resolve({ structuredContent: {
        total_downloads: 42, total_files: 67, size: '5.8 GB', total_bytes: 6227702579, skipped_entries: 1,
        by_kind: { audio: { files: 51 }, video: { files: 16 } },
        recent: [
          { title: 'Slow Pulp - Falling Apart Live', status: 'ok', timestamp: '2026-07-12 09:14' },
          { title: 'Japanese Breakfast - Live Session', status: 'ok', timestamp: '2026-07-12 08:50' },
          { title: 'Turnstile - Tiny Desk', status: 'partial', timestamp: '2026-07-11 22:03' }
        ]
      }});
      return Promise.resolve({ structuredContent: {
        query: 'slow pulp live', limit: 10,
        results: [
          { title: 'Slow Pulp - Falling Apart Live', url: 'https://www.youtube.com/watch?v=abc123', uploader: 'Slow Pulp', duration: 215, thumbnail: 'https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg' },
          { title: 'Slow Pulp - Idaho Live', url: 'https://www.youtube.com/watch?v=def456', uploader: 'Live Room', duration: 188, thumbnail: 'https://i.ytimg.com/vi/jNQXAC9IVRw/hqdefault.jpg' }
        ]
      }});
    }
  }
};
  </script>
  <script>
    const { App } = window.McpExtApps || {};
const resultsEl = document.querySelector("#results");
const statsEl = document.querySelector("#stats");
const form = document.querySelector("#search-form");
const queryEl = document.querySelector("#query");
const utilityEl = document.querySelector("#utility");
const hostContextEl = document.querySelector("#host-context");
const askButton = document.querySelector("#ask-button");
const fullscreenButton = document.querySelector("#fullscreen-button");
const downloadJsonButton = document.querySelector("#download-json-button");
const refreshStatsButton = document.querySelector("#refresh-stats-button");
const searchView = document.querySelector("#search-view");
const statsView = document.querySelector("#stats-view");
const tabButtons = Array.from(document.querySelectorAll("[data-view]"));
const app = App ? new App({ name: "YouTube search", version: "1.0.0" }) : null;
const isDemo = new URLSearchParams(window.location.search).has("demo");
let latestPayload = null;
let latestStats = null;
const demoResults = [
  {
    title: "Slow Pulp - Falling Apart Live",
    url: "https://www.youtube.com/watch?v=abc123",
    uploader: "Slow Pulp",
    duration: 215,
    thumbnail: "https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg"
  },
  {
    title: "Slow Pulp - Idaho Live",
    url: "https://www.youtube.com/watch?v=def456",
    uploader: "Live Room",
    duration: 188,
    thumbnail: "https://i.ytimg.com/vi/jNQXAC9IVRw/hqdefault.jpg"
  }
];

function formatDuration(seconds) {
  if (!seconds) return "unknown duration";
  const total = Math.round(seconds);
  return `${Math.floor(total / 60)}:${String(total % 60).padStart(2, "0")}`;
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  })[char]);
}

function showStatus(message) {
  resultsEl.innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
}

function prependStatus(message) {
  resultsEl.insertAdjacentHTML("afterbegin", `<div class="empty">${escapeHtml(message)}</div>`);
}

function setView(view) {
  const stats = view === "stats";
  searchView.hidden = stats;
  statsView.hidden = !stats;
  tabButtons.forEach((button) => {
    button.setAttribute("aria-selected", String(button.dataset.view === view));
  });
  persistState({ view });
  if (stats && !latestStats) loadStats().catch((error) => renderStatsError(error.message));
}

function render(results) {
  if (!results || results.length === 0) {
    showStatus("No results.");
    return;
  }
  resultsEl.innerHTML = results.map((item, index) => `
    <article class="result" aria-selected="${index === 0}">
      <img class="thumb" src="${escapeHtml(item.thumbnail || "")}" alt="" />
      <div class="copy">
        <h2 class="title">${escapeHtml(item.title || "Untitled")}</h2>
        <div class="meta">${escapeHtml(item.uploader || "Unknown channel")} - ${formatDuration(item.duration)}</div>
        <div class="meta">${escapeHtml(item.url)}</div>
      </div>
      <div class="actions">
        <button type="button" data-action="open" data-url="${escapeHtml(item.url)}">Open</button>
        <button type="button" data-action="probe" data-url="${escapeHtml(item.url)}">Probe</button>
        <button type="button" class="download" data-action="audio" data-url="${escapeHtml(item.url)}">Audio</button>
        <button type="button" class="download" data-action="video" data-url="${escapeHtml(item.url)}">Video</button>
      </div>
    </article>
  `).join("");
}

function renderStatsPayload(payload) {
  latestStats = payload || {};
  const recent = Array.isArray(latestStats.recent) ? latestStats.recent : [];
  const byKind = latestStats.by_kind || {};
  const kindSummary = Object.entries(byKind)
    .map(([kind, bucket]) => `${kind}: ${bucket.files ?? bucket.items ?? bucket.downloads ?? 0}`)
    .join(" / ") || "none";
  statsEl.innerHTML = `
    <div class="stats-summary">
      ${statCard("Downloads", latestStats.total_downloads ?? 0)}
      ${statCard("Files", latestStats.total_files ?? 0)}
      ${statCard("Bytes", latestStats.size || latestStats.total_bytes || 0)}
      ${statCard("Skipped", latestStats.skipped_entries ?? 0)}
    </div>
    <div class="stat-card">
      <div class="title">Kinds</div>
      <div class="meta">${escapeHtml(kindSummary)}</div>
    </div>
    <div class="stats-list">
      ${recent.length ? recent.map(renderRecent).join("") : '<div class="empty">No recent downloads yet.</div>'}
    </div>
  `;
  persistState({ latestStats });
  logHostEvent("rendered stats payload", { downloads: latestStats.total_downloads ?? 0 });
}

function statCard(label, value) {
  return `<div class="stat-card"><div class="stat-value">${escapeHtml(value)}</div><div class="stat-label">${escapeHtml(label)}</div></div>`;
}

function renderRecent(item) {
  const title = item.title || item.url || item.source_url || "Download";
  const when = item.timestamp || item.completed_at || "";
  const status = item.status || item.transfer_status || "";
  return `
    <article class="recent-item">
      <div class="copy">
        <h2 class="title">${escapeHtml(title)}</h2>
        <div class="meta">${escapeHtml([when, status].filter(Boolean).join(" - "))}</div>
      </div>
    </article>
  `;
}

function renderStatsError(message) {
  statsEl.innerHTML = `<div class="empty">${escapeHtml(friendlyError(message))}</div>`;
}

function toolText(result, fallback) {
  return result?.content?.find((item) => item.type === "text")?.text || fallback;
}

function getOpenAIState() {
  return window.openai?.widgetState?.privateContent || window.openai?.widgetState || {};
}

function persistState(nextState = {}) {
  const state = { query: queryEl.value.trim(), latestPayload, latestStats, ...getOpenAIState(), ...nextState };
  try {
    localStorage.setItem("ytdl-rmcp.searchState", JSON.stringify(state));
  } catch (_) {
    // Sandboxed hosts may disable storage.
  }
  if (window.openai?.setWidgetState) {
    window.openai.setWidgetState({
      modelContent: state.latestPayload
        ? [{ type: "text", text: `Current YouTube search query: ${state.query}` }]
        : [],
      privateContent: state
    });
  }
}

function restoreState() {
  const openaiState = getOpenAIState();
  if (openaiState.query || openaiState.latestPayload || openaiState.latestStats) return openaiState;
  try {
    return JSON.parse(localStorage.getItem("ytdl-rmcp.searchState") || "{}");
  } catch (_) {
    return {};
  }
}

function updateHostContext(context = app?.getHostContext?.() || {}) {
  const theme = context.theme || window.openai?.theme || "dark";
  const mode = context.displayMode || window.openai?.displayMode || "inline";
  const locale = context.locale || window.openai?.locale || "";
  document.documentElement.classList.toggle("dark", theme !== "light");
  hostContextEl.textContent = [theme, mode, locale].filter(Boolean).join(" / ");
  utilityEl.hidden = false;
}

function logHostEvent(message, data = {}) {
  app?.sendLog?.({ level: "info", logger: "ytdl-rmcp-ui", data: { message, ...data } });
}

async function callTool(name, args) {
  if (app?.callServerTool) return app.callServerTool({ name, arguments: args });
  if (window.openai?.callTool) return window.openai.callTool(name, args);
  throw new Error("No tool bridge available.");
}

async function sendFollowUp(prompt) {
  if (app?.sendMessage) return app.sendMessage({ role: "user", content: [{ type: "text", text: prompt }] });
  if (window.openai?.sendFollowUpMessage) return window.openai.sendFollowUpMessage({ prompt });
  throw new Error("No follow-up message bridge available.");
}

async function openExternal(url) {
  if (app?.openLink) return app.openLink({ url });
  if (window.openai?.openExternal) return window.openai.openExternal({ href: url });
  location.href = url;
}

async function requestDisplayMode(mode) {
  const available = app?.getHostContext?.()?.availableDisplayModes;
  if (Array.isArray(available) && !available.includes(mode)) return;
  if (app?.requestDisplayMode) return app.requestDisplayMode({ mode });
  if (window.openai?.requestDisplayMode) return window.openai.requestDisplayMode({ mode });
}

async function downloadPayload() {
  const payload = latestStats && statsView.hidden === false ? latestStats : latestPayload;
  if (!payload) return;
  const text = JSON.stringify(payload, null, 2);
  if (app?.downloadFile) {
    return app.downloadFile({ contents: [{ uri: "ui://ytdl-rmcp/youtube-app-data.json", mimeType: "application/json", text }] });
  }
  const blob = new Blob([text], { type: "application/json" });
  const href = URL.createObjectURL(blob);
  const anchor = document.createElement("a");
  anchor.href = href;
  anchor.download = "youtube-app-data.json";
  anchor.click();
  URL.revokeObjectURL(href);
}

async function publishModelContext(payload) {
  if (!payload) return;
  const summary = `${payload.results?.length || 0} YouTube results for "${payload.query || queryEl.value.trim()}".`;
  await app?.updateModelContext?.({
    content: [{ type: "text", text: summary }],
    structuredContent: { query: payload.query, results: (payload.results || []).slice(0, 5) }
  });
}

function friendlyError(message) {
  const text = String(message || "");
  // Keep "tools/call failed:" recognizable; some hosts surface hidden widget tools that way.
  if (/hidden while code[_ ]?mode/i.test(text) || /tools\/call failed:\s*404/i.test(text)) {
    return "This panel can't reach its YouTube tools because the MCP host is in code mode, which hides download/probe/search from direct calls. Enable widget tool callbacks on the host, or disable code mode, to probe, download, or re-search from here.";
  }
  try {
    const inner = JSON.parse(text)?.error?.message;
    if (inner) return inner;
  } catch (_) {
    // Not a JSON envelope; fall through to the original text.
  }
  return text || "Action failed.";
}

function parseResult(result) {
  if (result?.isError) throw new Error(toolText(result, "Search failed."));
  if (result?.structuredContent?.results) return result.structuredContent;
  const text = result?.content?.find((item) => item.type === "text")?.text;
  if (!text) throw new Error("Search returned no readable payload.");
  try {
    return JSON.parse(text);
  } catch (error) {
    throw new Error(`Search returned invalid JSON: ${error.message}`);
  }
}

function parseStatsResult(result) {
  if (result?.isError) throw new Error(toolText(result, "Stats failed."));
  if (result?.structuredContent) return result.structuredContent;
  const text = result?.content?.find((item) => item.type === "text")?.text;
  if (!text) throw new Error("Stats returned no readable payload.");
  try {
    return JSON.parse(text);
  } catch (error) {
    throw new Error(`Stats returned invalid JSON: ${error.message}`);
  }
}

function renderPayload(result) {
  const payload = parseResult(result);
  latestPayload = payload;
  if (payload.query) queryEl.value = payload.query;
  render(payload.results || []);
  persistState({ latestPayload: payload });
  publishModelContext(payload).catch(() => {});
  logHostEvent("rendered search payload", { query: payload.query, count: payload.results?.length || 0 });
}

async function loadStats() {
  statsEl.innerHTML = '<div class="empty">Loading stats...</div>';
  const response = await callTool("youtube_stats", { limit: 10, response_format: "json" });
  renderStatsPayload(parseStatsResult(response));
}

function actionToolCall(action, url) {
  const calls = {
    probe: { name: "youtube_probe", arguments: { urls: url } },
    audio: { name: "youtube_download", arguments: { urls: url, mode: "audio" } },
    video: { name: "youtube_download", arguments: { urls: url, mode: "video" } }
  };
  return calls[action];
}

function showConnectionError() {
  if (!isDemo && !window.openai) showStatus("Could not connect to the MCP host.");
}

if (app) app.ontoolinput = (params) => {
  const query = params?.arguments?.query ?? params?.query;
  if (query) queryEl.value = query;
};

if (app) app.ontoolinputpartial = (params) => {
  const query = params?.arguments?.query ?? params?.query;
  if (query) queryEl.value = query;
};

if (app) app.ontoolcancelled = () => {
  showStatus("Search cancelled.");
};

if (app) app.ontoolresult = (result) => {
  renderPayload(result);
};

if (app) app.onhostcontextchanged = (context) => {
  updateHostContext({ ...app.getHostContext?.(), ...context });
};

if (app) app.onerror = showConnectionError;

window.addEventListener("openai:set_globals", () => {
  updateHostContext();
  const state = restoreState();
  if (state.query) queryEl.value = state.query;
  if (state.latestPayload) renderPayload({ structuredContent: state.latestPayload });
  if (state.latestStats) renderStatsPayload(state.latestStats);
});

tabButtons.forEach((button) => {
  button.addEventListener("click", () => setView(button.dataset.view));
});

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  const query = queryEl.value.trim();
  if (!query) return;
  showStatus("Searching...");
  try {
    setView("search");
    persistState({ query });
    const response = await callTool("youtube_search", { query, limit: 10, response_format: "json" });
    renderPayload(response);
  } catch (error) {
    showStatus(friendlyError(error.message));
  }
});

resultsEl.addEventListener("click", async (event) => {
  const button = event.target.closest("button[data-action]");
  if (!button) return;
  const url = button.dataset.url;
  const action = button.dataset.action;
  if (action === "open") {
    openExternal(url).catch((error) => prependStatus(friendlyError(error.message)));
    return;
  }
  const toolCall = actionToolCall(action, url);
  if (!toolCall) return;
  try {
    const response = await callTool(toolCall.name, toolCall.arguments);
    if (response?.isError) throw new Error(toolText(response, "Action failed."));
    prependStatus(friendlyError(toolText(response, "Action completed.")));
  } catch (error) {
    prependStatus(friendlyError(error.message));
  }
});

askButton.addEventListener("click", () => {
  const first = latestPayload?.results?.[0];
  const prompt = first
    ? `Use ytdl-rmcp to download this result as audio: ${first.url}`
    : `Use ytdl-rmcp to search YouTube for: ${queryEl.value.trim()}`;
  sendFollowUp(prompt).catch((error) => prependStatus(friendlyError(error.message)));
});

fullscreenButton.addEventListener("click", () => {
  requestDisplayMode("fullscreen").catch((error) => prependStatus(friendlyError(error.message)));
});

downloadJsonButton.addEventListener("click", () => {
  downloadPayload().catch((error) => prependStatus(friendlyError(error.message)));
});

refreshStatsButton.addEventListener("click", () => {
  loadStats().catch((error) => renderStatsError(error.message));
});

queryEl.addEventListener("input", () => persistState({ query: queryEl.value.trim() }));

const restored = restoreState();
if (restored.query) queryEl.value = restored.query;
if (restored.latestPayload) renderPayload({ structuredContent: restored.latestPayload });
if (restored.latestStats) renderStatsPayload(restored.latestStats);
updateHostContext();
setView(restored.view || "search");

if (isDemo) {
  queryEl.value = "slow pulp live";
  render(demoResults);
  renderStatsPayload({ total_downloads: 12, total_files: 18, size: "1.4 GB", skipped_entries: 0, by_kind: { audio: { files: 14 }, video: { files: 4 } }, recent: [{ title: "Slow Pulp - Falling Apart Live", status: "ok", timestamp: "demo" }] });
}

if (app) {
  app.connect().then(() => updateHostContext()).catch(showConnectionError);
} else {
  showConnectionError();
}

  </script>
</body>
</html>
