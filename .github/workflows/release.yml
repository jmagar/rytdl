name: release

# Build the cross-platform binaries and attach them to a GitHub Release.
# A push to main cuts a unique release automatically; tag pushes keep the
# stable-version release path available.
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-meta:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - id: meta
        name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            release_name="ytdl-mcp ${tag}"
          else
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
            if [[ -z "$version" ]]; then
              echo "::error::could not read package version from Cargo.toml"
              exit 1
            fi
            short_sha="$(git rev-parse --short=12 HEAD)"
            tag="v${version}-main.${GITHUB_RUN_NUMBER}.${short_sha}"
            release_name="ytdl-mcp ${version} (${short_sha})"
          fi
          echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

  packaging:
    needs: release-meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install packaging check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck
      - name: Validate plugin packaging
        run: REQUIRE_SHELLCHECK=1 scripts/check-packaging.sh

  build:
    needs: [release-meta, packaging]
    # contents: write is inherited from the top-level grant; id-token + attestations
    # are the minimal extras needed for keyless build-provenance (cd-h2).
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ytdl-mcp-linux-x86_64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: ubuntu-latest
            artifact: ytdl-mcp-windows-x86_64.exe
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          targets: ${{ matrix.target }}

      # ring assembles x64 Windows asm with NASM; cargo-xwin needs the LLVM
      # toolchain. Both are no-ops for the native Linux target.
      - name: Install cross toolchain
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm llvm clang lld
          cargo install cargo-xwin --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (v2.9.1)
        with:
          key: ${{ matrix.target }}

      - name: Build (linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (windows cross)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo xwin build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact + checksum
        run: |
          cp "target/${{ matrix.target }}/release/ytdl-mcp${{ matrix.ext }}" "${{ matrix.artifact }}"
          sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      # Generate a keyless GitHub build-provenance attestation for the binary so
      # consumers can verify it was built by this workflow (cd-h2). No secrets:
      # signing uses the job's OIDC token via id-token: write.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ matrix.artifact }}

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  mcpb:
    # Bundle the linux + windows binaries into a single .mcpb (MCP bundle) for
    # one-click install in MCPB-capable desktop hosts.
    needs: [release-meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download linux binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ytdl-mcp-linux-x86_64
          path: dist/linux

      - name: Download windows binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ytdl-mcp-windows-x86_64.exe
          path: dist/windows

      - name: Pack .mcpb
        env:
          LINUX_BIN: dist/linux/ytdl-mcp-linux-x86_64
          WINDOWS_BIN: dist/windows/ytdl-mcp-windows-x86_64.exe
          OUT: ytdl-mcp.mcpb
        run: scripts/build-mcpb.sh

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ytdl-mcp.mcpb
          path: |
            ytdl-mcp.mcpb
            ytdl-mcp.mcpb.sha256
            ytdl-mcp.dxt
            ytdl-mcp.dxt.sha256

  publish-release:
    needs: [release-meta, build, mcpb]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist/release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.release-meta.outputs.tag_name }}
          name: ${{ needs.release-meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          files: dist/release-assets/*

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (v2.9.1)
      - run: cargo test --all --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
